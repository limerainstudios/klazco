<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Sales</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="sales-container">


<h1>

Contact Our Sales Department

</h1>


<p>

Please complete the enquiry form below.
A representative will review your request.

</p>


<form onsubmit="return fakeSubmit();">


<input type="text"
placeholder="Full Name"
required>


<input type="email"
placeholder="Email Address"
required>


<select required>

<option value="">Select VPS Package</option>

<option>Starter VPS</option>

<option>Professional VPS</option>

<option>Enterprise Cloud</option>

</select>


<textarea
placeholder="Please provide additional details."
required></textarea>


<button type="submit">

Submit Enquiry

</button>


</form>


<p id="message"></p>


<a href="index.html" class="button">

Return Home

</a>


</div>



<script>

function fakeSubmit(){

document.getElementById("message").innerHTML =

"Thank you for your enquiry. Our sales department will contact you within 1-3 business days. (This form does not collect or store any information.)";

return false;

}

</script>



</body>

</html>
